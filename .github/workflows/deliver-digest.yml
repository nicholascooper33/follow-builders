name: Deliver Digest to Telegram

# Triggered when Claude pushes a new digest file
on:
  push:
    paths:
      - 'digests/latest.txt'

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DIGEST_TEXT=$(cat digests/latest.txt)

          if [ -z "$DIGEST_TEXT" ]; then
            echo "Empty digest, skipping"
            exit 0
          fi

          # Telegram has a 4096 char limit per message, so split if needed
          split -b 3900 -d --additional-suffix=.chunk digests/latest.txt /tmp/chunk_

          for chunk_file in /tmp/chunk_*.chunk; do
            CHUNK=$(cat "$chunk_file")
            curl -s -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$(jq -n --arg text "$CHUNK" --arg chat_id "$TELEGRAM_CHAT_ID" \
                '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}')"
            sleep 1
          done

          echo "Digest delivered to Telegram"
